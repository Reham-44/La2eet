<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول – لقيت</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-laqeet">
  <div class="container">
    <a class="navbar-brand" href="index.html"><i class="fas fa-search-location me-2"></i>ل<span>قيت</span></a>
  </div>
</nav>

<section class="auth-section">
  <div class="container">
    <div class="auth-card">
      <div class="text-center mb-4">
        <div style="font-size:2.5rem;color:var(--primary)"><i class="fas fa-search-location"></i></div>
        <h3 class="mt-2">أهلاً بيك في لقيت</h3>
        <p>سجّل دخولك للمتابعة</p>
      </div>

      <div class="d-flex gap-2 mb-3">
        <button class="social-btn"><img src="https://www.svgrepo.com/show/475656/google-color.svg" width="20" /> تسجيل بجوجل</button>
        <button class="social-btn"><i class="fab fa-facebook-f text-primary fs-5"></i> فيسبوك</button>
      </div>

      <div class="divider-text"><span>أو بالإيميل</span></div>

      <form id="loginForm" novalidate>
        <div class="mb-3">
          <label class="form-label" for="email">البريد الإلكتروني</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-envelope text-muted"></i></span>
            <input type="email" class="form-control" id="email" name="Email" placeholder="example@email.com" required />
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label" for="password">كلمة المرور</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-lock text-muted"></i></span>
            <input type="password" class="form-control" id="password" name="Password" placeholder="كلمة المرور" required />
            <button class="btn btn-outline-secondary" type="button" onclick="togglePass()"><i class="fas fa-eye" id="eyeIcon"></i></button>
          </div>
        </div>
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="remember" name="RememberMe" />
            <label class="form-check-label small" for="remember">تذكرني</label>
          </div>
          <a href="#" class="small text-primary">نسيت كلمة المرور؟</a>
        </div>
        <button type="submit" class="btn btn-primary w-100 btn-lg"><i class="fas fa-sign-in-alt me-2"></i>تسجيل الدخول</button>
      </form>

      <div class="text-center mt-3 small">
        معندكش حساب؟ <a href="register.html" class="text-primary fw-bold">سجّل دلوقتي</a>
      </div>
    </div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePass() {
  const p = document.getElementById('password');
  const icon = document.getElementById('eyeIcon');
  if (p.type === 'password') { p.type = 'text'; icon.className = 'fas fa-eye-slash'; }
  else { p.type = 'password'; icon.className = 'fas fa-eye'; }
}

document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();
  window.location = 'profile.html';
});
</script>
</body>
</html>
