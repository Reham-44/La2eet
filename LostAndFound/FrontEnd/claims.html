<!-- Toast -->
<div class="toast-container">
  <div id="actionToast" class="toast align-items-center border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toastBody"></div>
      <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="data.js"></script>
<script>
const MY_CLAIMS = [
  { itemId: 1, date: '2025-04-21', status: 'pending' },
  { itemId: 3, date: '2025-04-20', status: 'approved' },
  { itemId: 5, date: '2025-04-19', status: 'rejected' },
  { itemId: 8, date: '2025-04-18', status: 'pending' },
  { itemId: 11, date: '2025-04-17', status: 'approved' },
];

const INCOMING = [
  { claimant: 'محمد علي', phone: '01023456789', itemId: 2, date: '2025-04-22', status: 'pending' },
  { claimant: 'سارة أحمد', phone: '01198765432', itemId: 4, date: '2025-04-21', status: 'pending' },
  { claimant: 'عمر حسن', phone: '01567891234', itemId: 6, date: '2025-04-20', status: 'pending' },
];

const statusMap = { pending: { label: 'قيد المراجعة', color: 'warning text-dark' }, approved: { label: 'مقبول', color: 'success' }, rejected: { label: 'مرفوض', color: 'danger' } };

function renderMyClaims() {
  const items = getAllItems();
  document.getElementById('myClaimsContainer').innerHTML = MY_CLAIMS.map(c => {
    const item = items.find(i => i.id === c.itemId);
    if (!item) return '';
    const s = statusMap[c.status];
    return `
      <div class="claim-row">
        <img src="${safeUrl(item.image)}" class="claim-img" />
        <div style="flex:1">
          <div class="fw-bold">${escapeHtml(item.title)}</div>
          <div class="small text-muted">${escapeHtml(item.city)} | طلبت في ${formatDate(c.date)}</div>
        </div>
        ${getStatusBadge(item.status)}
        <span class="badge bg-${s.color}">${s.label}</span>
        <a href="details.html?id=${item.id}" class="btn btn-sm btn-outline-primary">عرض</a>
      </div>
    `;
  }).join('');
}

function renderIncoming() {
  const items = getAllItems();
  document.getElementById('incomingContainer').innerHTML = INCOMING.map((c, i) => {
    const item = items.find(it => it.id === c.itemId);
    if (!item) return '';
    return `
      <div class="claim-row" id="inc${i}">
        <img src="${safeUrl(item.image)}" class="claim-img" />
        <div style="flex:1">
          <div class="fw-bold">${escapeHtml(c.claimant)} طالب بـ "${escapeHtml(item.title)}"</div>
          <div class="small text-muted"><i class="fas fa-phone me-1"></i>${escapeHtml(c.phone)} | ${formatDate(c.date)}</div>
        </div>
        <span class="badge bg-warning text-dark">جديد</span>
        <div class="d-flex gap-1">
          <button class="btn btn-sm btn-success" onclick="handleClaim(${i}, 'approve')"><i class="fas fa-check me-1"></i>قبول</button>
          <button class="btn btn-sm btn-danger" onclick="handleClaim(${i}, 'reject')"><i class="fas fa-times me-1"></i>رفض</button>
        </div>
      </div>
    `;
  }).join('');
}

function handleClaim(i, action) {
  const row = document.getElementById('inc' + i);
  const badge = row.querySelector('.badge');
  if (action === 'approve') {
    badge.className = 'badge bg-success';
    badge.textContent = 'تم القبول';
    showToast('تم قبول المطالبة وإشعار المطالِب', 'success');
  } else {
    badge.className = 'badge bg-danger';
    badge.textContent = 'مرفوض';
    showToast('تم رفض المطالبة', 'danger');
  }
  row.querySelectorAll('button').forEach(b => b.remove());
}

function showToast(msg, type) {
  const t = document.getElementById('actionToast');
  t.className = `toast align-items-center text-bg-${type} border-0`;
  document.getElementById('toastBody').textContent = msg;
  new bootstrap.Toast(t).show();
}

document.addEventListener('DOMContentLoaded', () => {
  renderMyClaims();
  renderIncoming();
});
</script>
</body>
