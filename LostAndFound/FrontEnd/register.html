<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>إنشاء حساب – لقيت</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-laqeet">
  <div class="container">
    <a class="navbar-brand" href="index.html"><i class="fas fa-search-location me-2"></i>ل<span>قيت</span></a>
  </div>
</nav>

<section class="auth-section">
  <div class="container">
    <div class="auth-card">
      <div class="text-center mb-4">
        <div style="font-size:2.5rem;color:var(--primary)"><i class="fas fa-user-plus"></i></div>
        <h3 class="mt-2">إنشاء حساب جديد</h3>
        <p>انضم لمنصة لقيت مجاناً</p>
      </div>

      <div class="d-flex gap-2 mb-3">
        <button class="social-btn"><img src="https://www.svgrepo.com/show/475656/google-color.svg" width="20" /> تسجيل بجوجل</button>
        <button class="social-btn"><i class="fab fa-facebook-f text-primary fs-5"></i> فيسبوك</button>
      </div>

      <div class="divider-text"><span>أو بالإيميل</span></div>

      <form id="regForm" novalidate>
        <div class="row g-3">
          <div class="col-6">
            <label class="form-label" for="firstName">الاسم الأول</label>
            <input type="text" class="form-control" id="firstName" name="FirstName" placeholder="محمد" required />
          </div>
          <div class="col-6">
            <label class="form-label" for="lastName">الاسم الأخير</label>
            <input type="text" class="form-control" id="lastName" name="LastName" placeholder="أحمد" required />
          </div>
          <div class="col-12">
            <label class="form-label" for="regEmail">البريد الإلكتروني</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-envelope text-muted"></i></span>
              <input type="email" class="form-control" id="regEmail" name="Email" placeholder="example@email.com" required />
            </div>
          </div>
          <div class="col-12">
            <label class="form-label" for="phone">رقم الموبايل</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-phone text-muted"></i></span>
              <input type="tel" class="form-control" id="phone" name="PhoneNumber" placeholder="01xxxxxxxxx" required />
            </div>
          </div>
          <div class="col-12">
            <label class="form-label" for="city">المدينة</label>
            <select class="form-select" id="city" name="City" required>
              <option value="">اختر مدينتك</option>
              <option>القاهرة</option>
              <option>الجيزة</option>
              <option>الإسكندرية</option>
              <option>المنصورة</option>
              <option>أسوان</option>
              <option>الأقصر</option>
            </select>
          </div>
          <div class="col-12">
            <label class="form-label" for="regPass">كلمة المرور</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-lock text-muted"></i></span>
              <input type="password" class="form-control" id="regPass" name="Password" placeholder="8 أحرف على الأقل" required minlength="8" />
              <button class="btn btn-outline-secondary" type="button" onclick="togglePass()"><i class="fas fa-eye" id="eyeIcon"></i></button>
            </div>
          </div>
          <div class="col-12">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="terms" name="AcceptTerms" required />
              <label class="form-check-label small" for="terms">أوافق على <a href="#" class="text-primary">الشروط والأحكام</a> و<a href="#" class="text-primary">سياسة الخصوصية</a></label>
            </div>
          </div>
          <div class="col-12">
            <button type="submit" class="btn btn-primary w-100 btn-lg"><i class="fas fa-user-plus me-2"></i>إنشاء حساب</button>
          </div>
        </div>
      </form>

      <div class="text-center mt-3 small">
        عندك حساب؟ <a href="login.html" class="text-primary fw-bold">سجّل دخولك</a>
      </div>
    </div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePass() {
  const p = document.getElementById('regPass');
  const icon = document.getElementById('eyeIcon');
  if (p.type === 'password') { p.type = 'text'; icon.className = 'fas fa-eye-slash'; }
  else { p.type = 'password'; icon.className = 'fas fa-eye'; }
}
document.getElementById('regForm').addEventListener('submit', function(e) {
  e.preventDefault();
  if (!this.checkValidity()) { this.classList.add('was-validated'); return; }
  window.location = 'profile.html';
});
</script>
</body>
</html>
